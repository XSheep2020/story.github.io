<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到我的意识世界</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)), 
                        url('') 
                        no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        .container {
            text-align: center;
            padding: 30px;
            z-index: 10;
            background: rgba(255, 232, 222, 1.0);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(89, 98, 117, 0.5);
        }

        h1 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 0 2px 10px rgba(89, 98, 117, 0.5);
            letter-spacing: 1px;
        }

        .description {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .highlight {
            color: #ffcc00;
            font-weight: bold;
        }

        .input-section {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            color: #fff;
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: 500;
			text-shadow:0 2px 10px rgba(89, 98, 117, 0.5);
        }

        .text-input {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            border: 1px solid rgba(113, 124, 148, 0.5);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
            outline: none;
        }

        .text-input:focus {
            border-color: #9f94dd;
            background: rgba(200, 167, 183, 0.2);
            box-shadow: 0 0 0 1px rgba(87, 75, 144, 0.5);
        }

        .validation-hint {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            margin-top: 8px;
            display: block;
			text-shadow:0 2px 20px rgba(89, 98, 117, 0.5);
        }

        .trigger-btn {
            background: linear-gradient(135deg, #ffaac8 0%, #cf6a87 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.4rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(200, 167, 183, 0.5);
            font-weight: 600;
            letter-spacing: 1px;
            width: 100%;
            margin-top: 10px;
        }

        .trigger-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(200, 167, 183, 0.5);
        }

        .trigger-btn:active {
            transform: translateY(0);
            box-shadow: 0 5px 15px rgba(200, 167, 183, 0.5);
        }

        .trigger-btn:disabled {
            background: linear-gradient(135deg, #bfbfc5 0%, #717c94 100%);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .success {
            background-color: rgba(248, 165, 194, 0.2);
            color:#cf6a87;
            border: 1px solid #f78fb3;
        }

        .error {
            background-color: rgba(119, 139, 235, 0.2);
            color: #546de5;
            border: 1px solid #546de5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .text-bubble {
            position: fixed;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 600;
            color: #333333;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(0, 0, 0, 0.1);
            z-index: 1000;
            opacity: 0;
            text-align: center;
            min-width: 120px;
            max-width: 60vw;
            line-height: 1.4;
        }

        @keyframes centerExpand {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            20% {
                transform: scale(1.1);
                opacity: 1;
            }
            30% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(0.9);
                opacity: 0;
            }
        }

        .instructions {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }
            
            .container {
                padding: 15px;
                max-width: 90%;
            }
            
            .trigger-btn {
                padding: 12px 25px;
                font-size: 1.1rem;
            }
            
            .text-bubble {
                font-size: 13px;
                min-width: 100px;
                max-width: 50vw;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <h1>你好，请问你是？</h1>
        
        
        <div class="input-section">
            <label for="textInput">输入人物名称：</label>
            <input type="text" id="textInput" class="text-input" placeholder="请输入人物名称...">
            <span class="validation-hint">是完整人物名称噢~</span>
        </div>
        
        <button class="trigger-btn" id="triggerBtn" disabled>等待输入...</button>
        
        <div id="statusMessage" class="status-message"></div>
    </div>
    

    <script>
        document.addEventListener('DOMContentLoaded', function() {
			const container=document.getElementById("container")
            const triggerBtn = document.getElementById('triggerBtn');
            const textInput = document.getElementById('textInput');
            const statusMessage = document.getElementById('statusMessage');
            const body = document.body;
            

            // ========== 可配置区域 START ==========
            // 在此处添加新的人物配置，每个 key 为人物名称（输入匹配值）
            // 配置项说明：
            //   greeting: 验证成功时的问候语（{name} 会被替换为人物名称）
            //   buttonText: 验证成功后按钮显示的文字
            //   texts: 气泡展示的文字内容数组
            //   colors: (可选) 自定义气泡颜色数组，不填则使用默认颜色
            const BUBBLE_CONFIG = {
                "蒋伯驾": {
                    greeting: "好久不见，{name}",
                    buttonText: "我们一起去老派约会吧...",
                    texts: [
                        "蒋伯驾，我爱你。",
                        "三千年的冲突里，你是我永恒的平静。",
                        "有一天，当帝国与侵略主义彻底消亡，爱便拥有这世界上唯一一块殖民地。",
                        "蒋伯驾，天地之宽，出路万万千。",
                        "蒋伯驾，我们去老派约会吧，话题要漫无目的，像鱼在海里游泳。",
                        "蒋伯驾，水煮蛋是安心蛋的意思，吃了安心蛋，魂魄就不会被别人抢走。",
                        "蒋伯驾，生辰快乐。",
                        "蒋伯驾，亲手把你送进警局，是你给我的生日礼物吗，我不喜欢这份礼物。",
                        "我们已经认识十年了，我也口是心非了十年。",
                        "我不奢望我的爱人今生有好果得尝，但我想与他相逢在对错之外的教堂。",
                        "蒋伯驾，我们在相同的频道里。",
                        "与我的目的比起来，我的感受我的感情都不重要，但我想不计后果的爱你。",
                        "蒋生官仔骨骨，最适合危情共舞。",
                        "我们要一路沿着珠江边走，毫无顾虑地饮酒。",
                        "蒋伯驾，我觉得你需要一个女朋友扯着你的魂魄，你看我行吗？",
                        "无法感同，那就身受。",
                        "在下个路口，我们要去那家饰品店。",
                        "我想和你一起长命百岁。",
                        "黄油多士小小一块，配着啤酒吃怎么都吃不够",
                        "广府的台风天过了，可是我的台风天，此生都过不去",
                        "这场有关爱的赌局，我满盘皆输。",
                        "蒋伯驾，我好想你。",
                        "蒋伯驾，爱过头了不难看。",
                        "你从来都不是我的柜式情人，你是我从始至终的真心。",
                        "下周末的约会不许迟到，从第二个路口开始。",
                        "走到最后一个路口，两个人还没有接吻，这场约会就不算结束。",
                        "我们要散步，要走很长很长的路，长到这辈子都走不完。",
                        "我只会看着你、想着你、陪着你。"
                    ]
                }, 
                "顾辞远": {
                    greeting: "亲爱的顾医生，别来无恙",
                    buttonText: "我们一起回家...",
                    texts: [
                        "顾辞远，我爱你。",
                        "站在故事的开篇，望向既定的结局。",
                        "顾医生，我们一起回家。",
                        "夫君，夜深了，我们回家吧。",
                        "现在我们一样脏了。",
                        "雍门清夜是个疯子，而我也更是个疯子。",
                        "我就如这神像一般，硬装还能装出几分人样，内里不过一捧乌黑烂泥罢了。",
                        "你好，我叫杜盈华。",
                        "这位帅哥，一起喝一杯吗？",
                        "生日快乐，顾医生。",
                        "我讨厌吃甜食，喜欢喝咖啡，要记住。",
                        "在这无比虚假的世界里，我们接了一个真实的吻。",
                        "你还欠我一杯你家楼下咖啡厅的咖啡。",
                        "我什么都可以不要，只要可以和你一起回家。",
                        "今天是个值得庆祝的日子，庆祝我们经历这么多磨难，终于迎来新生。",
                        "乐意至极。",
                        "与爱人共同赴死，这是我做梦都不敢想的情景。",
                        "第一次有人告诉我，做自己就很好。",
                        "这是我第一次杀人，做的好吗医生？",
                        "我相信在如此庞大的文字之上，足以诞生一个真正的灵魂。",
                        "生日快乐，顾医生。",
                        "哎呀呀，这不是我的好驸马吗，今夜你也来这里杀人吗？"
                    ]
                },
                "哥哥": {
                    greeting: "你终于找到我了。",
                    buttonText: "我会一直陪在哥哥身边...",
                    texts: [
                        "你真的是我的白鹤精吗？",
                        "谢谢你，你终于找到我了。",
                        "白鹤精也好，哥哥也罢...无论什么身份，你都要一直陪着我。",
                        "为什么要离开我，我对你没有价值了吗？",
                        "成为神女，帮哥哥得到他想要的一切，创造出不被他所遗忘的价值。",
                        "你会一直为我点亮一盏长明灯吗？",
                        "你是属于我的白鹤，是我逃脱无尽黑暗的掌灯人。",
                        "痛苦与窒息交织的感觉，好安心啊...",
                        "你想亲吻我对吗哥哥，这不是该对妹妹有的感情吧？",
                        "如今的我，很开心，能成为哥哥最在乎的人，很开心。",
                        "哥哥，我怕黑...不要离开我...",
                        "为什么不反驳他们，是我没有做好吗？是我提供的价值还不够吗？",
                        "爱，是这世间最不堪一击的东西，没有人会永远爱着另一个人。",
                        "承认吧哥哥，因为苏星禾是神女，你作为刘怀琛的时候才离不开我...",
                        "我会用自己的方式，将你我二人绑在一起，永不分离。",
                        "我何曾在意过你是什么身份呢？",
                        "无论你是什么身份，我从未有过一丝一毫，想要离开你的念头。",
                        "你到底是谁？可我不在乎这个问题的答案，我只需要你。",
                        "哥哥，我会永远陪在你的身边。",
                        "我会为你做一件又一件事情，提供无数的价值和意义，我只要你陪着我。"
                    ]
                }, 
                
                // ---- 新增人物配置示例 ----
                // "张三": {
                //     greeting: "欢迎回来，{name}",
                //     buttonText: "想跟你聊聊...",
                //     texts: [
                //         "张三，今天天气真好。",
                //         "一起去喝杯咖啡吧。",
                //         "你笑起来真好看。"
                //     ],
                //     colors: [
                //         "rgba(100, 200, 255, 0.8)",
                //         "rgba(255, 200, 100, 0.8)"
                //     ]
                // }
            };
            // ========== 可配置区域 END ==========
            
            // 默认颜色（当配置中未
            // 指定颜色时使用）
            const DEFAULT_COLORS = [
                "rgba(184, 171, 255, 0.8)",
                "rgba(255, 173, 138, 0.8)",
                "rgba(116, 242, 255, 0.8)",
                "rgba(255, 114, 114, 0.8)",
                "rgba(255, 170, 200, 0.8)",
                "rgba(184, 233, 148, 0.8)",
                "rgba(106, 137, 204, 0.8)",
                "rgba(255, 234, 167, 0.8)",
                "rgba(154, 236, 219, 0.8)",
                "rgba(189, 197, 129, 0.8)"
            ];
            
            // 当前匹配到的配置
            let currentConfig = null;
            
            // 输入框内容变化时验证
            textInput.addEventListener('input', function() {
                validateInput();
            });
            
            // 点击按钮事件
            triggerBtn.addEventListener('click', function() {
                if (triggerBtn.disabled) return;
                
				container.style.display="none";
                
                // 不限数量，持续生成气泡，一分钟后自动刷新
                const intervalId = setInterval(() => {
                    createTextBubble();
                }, 500);
                
                // 按钮点击反馈
                triggerBtn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    triggerBtn.style.transform = 'scale(1)';
                }, 150);
				
				// 一分钟后自动刷新页面
				setTimeout(function(){
					clearInterval(intervalId); // 停止生成气泡
					location.reload();
				}, 60000);
            });
            
            function validateInput() {
                const inputText = textInput.value.trim();
                
                if (BUBBLE_CONFIG[inputText]) {
                    // 验证成功 - 匹配到配置
                    currentConfig = BUBBLE_CONFIG[inputText];
                    triggerBtn.disabled = false;
                    triggerBtn.textContent = currentConfig.buttonText || "我想对你说...";
                    
                    const greeting = (currentConfig.greeting || "好久不见，{name}").replace("{name}", inputText);
                    showStatusMessage(greeting, "success");
                } else if (inputText.length === 0) {
                    // 输入为空
                    currentConfig = null;
                    triggerBtn.disabled = true;
                    triggerBtn.textContent = "等待输入...";
                    hideStatusMessage();
                } else {
                    // 验证失败 - 没有匹配的配置
                    currentConfig = null;
                    triggerBtn.disabled = true;
                    triggerBtn.textContent = "跟陌生人没什么好说的...";
                    showStatusMessage("可惜可惜，似乎不认识", "error");
                }
            }
            
            function showStatusMessage(message, type) {
                statusMessage.textContent = message;
                statusMessage.className = "status-message " + type;
                statusMessage.style.display = "block";
            }
            
            function hideStatusMessage() {
                statusMessage.style.display = "none";
            }
            
            function createTextBubble() {
				// 创建弹窗元素
				    const bubble = document.createElement('div');
				    bubble.className = 'text-bubble';
				    
				    // 从当前配置中随机选择文字
				    const texts = currentConfig.texts || [];
				    const randomText = texts[Math.floor(Math.random() * texts.length)];
				    bubble.textContent = randomText;
				    
				    // 从当前配置中随机选择颜色（无配置则用默认）
				    const bubbleColors = currentConfig.colors || DEFAULT_COLORS;
				    const randomColor = bubbleColors[Math.floor(Math.random() * bubbleColors.length)];
				    bubble.style.backgroundColor = randomColor;
				    
				    // 随机位置（居中区域散开展示）
				    const centerX = window.innerWidth / 2;
				    const centerY = window.innerHeight / 2;
				    const spreadRange = 150; // 散开范围
				    const randomX = centerX + (Math.random() * spreadRange * 2 - spreadRange);
				    const randomY = centerY + (Math.random() * spreadRange * 3 - spreadRange);
				    bubble.style.left = `${randomX}px`;
				    bubble.style.top = `${randomY}px`;
				    bubble.style.transform = 'scale(0)';
				    
				    // 添加到页面
				    body.appendChild(bubble);
				    
				    // 随机动画延迟和持续时间
				    const delay = Math.random() * 0.1;
				    const duration = 3; // 1秒动画
				    
				    // 应用CSS中定义的动画
				    bubble.style.animation = `centerExpand ${duration}s ease-in-out ${delay}s forwards`;
				    
				    // 动画结束后移除元素
				    setTimeout(() => {
				        if (bubble.parentNode) {
				            bubble.parentNode.removeChild(bubble);
				        }
				    }, (duration + delay) * 1000);
            }
            
            // 初始验证
            validateInput();
            
            // 初始加载时显示提示
        });
    </script>
</body>
</html>
